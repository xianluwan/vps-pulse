<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>VPS Pulse</title><link rel="stylesheet" href="/style.css"></head><body>
<div id="login" class="center"><form class="panel" onsubmit="login(event)"><div class="brand">VPS<span>Pulse</span></div><p>个人实时服务器控制台</p><input id="password" type="password" placeholder="管理员密码" required><button>登录</button><small id="loginError"></small></form></div>
<main id="app" hidden><header><div class="brand">VPS<span>Pulse</span></div><div><span id="online"></span><button class="ghost" onclick="openAdd()">＋ 添加 VPS</button></div></header><section class="hero"><div><small>基础设施状态</small><h1>所有服务器，尽在掌握</h1><p>毫秒级流量反馈 · 自动换 IP · DNS 联动</p></div><div class="clock" id="clock"></div></section><section id="cards" class="grid"></section></main>
<dialog id="editor"><form method="dialog" onsubmit="save(event)"><h2 id="formTitle">添加 VPS</h2><input type="hidden" id="id"><label>名称<input id="name" required placeholder="香港主机 01"></label><div class="row"><label>日流量额度（GB，0=无限）<input id="dayLimit" type="number" min="0"></label><label>月流量额度（GB，0=无限）<input id="monthLimit" type="number" min="0"></label></div><label>月账单日<input id="billingDay" type="number" min="1" max="28" value="1"></label><label>Ping IP 或域名<input id="pingTarget" placeholder="1.1.1.1"></label><label>换 IP Shell 命令<textarea id="changeIpCommand" placeholder="curl -X POST ..."></textarea></label><h3>Cloudflare DNS</h3><input id="cfRecordName" placeholder="主机名 vps.example.com"><input id="cfZoneId" placeholder="Zone ID"><input id="cfRecordId" placeholder="Record ID"><input id="cfToken" type="password" placeholder="API Token（留空保持不变）"><menu><button type="button" class="ghost" onclick="editor.close()">取消</button><button>保存</button></menu><pre id="install"></pre></form></dialog>
<script src="/app.js"></script><script src="/agent-commands.js"></script><script src="/auto-recovery.js"></script><script src="/list-view.js"></script><script src="/logs.js"></script><script src="/telegram-settings.js"></script></body></html>
